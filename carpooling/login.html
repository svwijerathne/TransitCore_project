<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - SmartRide</title>

    <link rel="stylesheet" href="login.css">

</head>


<body>



<!-- Navigation Bar -->

<header>

    <div class="logo">
        🚗 SmartRide
    </div>


    <nav>

        <a href="index.html">Home</a>

        <a href="#">How It Works</a>

        <a href="support.html">Support</a>

        <a href="login.html">Login</a>

    </nav>


</header>

<!-- Login/Register Section -->


<section class="login-container">


    <div class="login-box">


        <h1>
            Welcome to SmartRide
        </h1>


        <p>
            Join our smart car pooling community
        </p>



        <form>


            <!-- Role -->

            <label>
                Select Role
            </label>


            <select>

                <option>
                    Select Role
                </option>

                <option>
                    Driver
                </option>

                <option>
                    User
                </option>


            </select>





            <!-- Full Name -->


            <label>
                Full Name
            </label>


            <input 
            type="text"
            placeholder="Enter your full name">






            <!-- Gender -->


            <label>
                Gender
            </label>


            <div class="gender">


                <label>
                    <input type="radio" name="gender">
                    Male
                </label>



                <label>
                    <input type="radio" name="gender">
                    Female
                </label>



                <label>
                    <input type="radio" name="gender">
                    Other
                </label>


            </div>





            <!-- Email -->


            <label>
                Email Address
            </label>


            <input 
            type="email"
            placeholder="Enter your email">






            <!-- Phone Number -->


            <label>
                Phone Number
            </label>


            <input 
            type="tel"
            placeholder="Enter phone number">




            <label>
                NIC Number
            </label>

            <input
            type="nic"
            placeholder="Enter NIC number"






            <!-- Password -->


            <label>
                Password
            </label>


            <input 
            type="password"
            placeholder="Create password">






            <button>
                Register / Login
            </button>



        </form>


    </div>


</section>





<footer>

    <p>
        © 2026 SmartRide | Smart Car Pooling System
    </p>

</footer>



</body>

</html>
